name: Build Scribe APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Stable debug keystore ──────────────────────────────────────────────
      # Fixed cache key means every build reuses the same keystore → same APK
      # signature → install-over-update works without uninstalling.
      # Bump v1→v2 only to intentionally rotate the signing key.
      - name: Restore debug keystore from cache
        id: ks-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: scribe-debug-keystore-v1

      - name: Generate debug keystore (first build only)
        if: steps.ks-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          echo "New debug keystore created and cached."

      # ── Gradle ────────────────────────────────────────────────────────────
      # setup-gradle installs Gradle 8.10.2 as a binary on PATH.
      # We call `gradle` directly to avoid the wrapper jar entirely.
      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
          validate-wrappers: false

      - name: Build release APK
        run: gradle app:assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: scribe-release-apk
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: Build debug APK (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: gradle app:assembleDebug --no-daemon

      - name: Upload debug APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: scribe-debug-apk
          path: app/build/outputs/apk/debug/app-debug*.apk
          retention-days: 7
